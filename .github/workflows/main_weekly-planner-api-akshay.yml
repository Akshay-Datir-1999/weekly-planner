name: Build and deploy ASP.Net Core app to Azure Web App - weekly-planner-api-akshay

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore WeeklyPlanner.API/WeeklyPlanner.API.csproj

      - name: Build
        run: dotnet build WeeklyPlanner.API/WeeklyPlanner.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish WeeklyPlanner.API/WeeklyPlanner.API.csproj --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_281AC29E44CB4DF0A00612FA246925B5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_96C6B81CDAEA4C8087A6FE962239EFFF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_15F8DB15833B4BABA053266A32F00CCA }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: weekly-planner-api-akshay
          package: ./publish