name: CD — Deploy to Azure

on:
  push:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Deploy Backend → Azure App Service
  # ─────────────────────────────────────────
  deploy-backend:
    name: Deploy .NET API → Azure App Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build & Publish
        run: >
          dotnet publish WeeklyPlanner.API/WeeklyPlanner.API.csproj
          --configuration Release
          --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish

  # ─────────────────────────────────────────
  # JOB 2: Deploy Frontend → Azure Static Web Apps
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy Angular → Azure Static Web Apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: weekly-planner-ui/package-lock.json

      - name: Install dependencies
        working-directory: weekly-planner-ui
        run: npm ci

      - name: Build Angular app (production)
        working-directory: weekly-planner-ui
        run: npm run build -- --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: weekly-planner-ui
          output_location: dist/weekly-planner-ui/browser
