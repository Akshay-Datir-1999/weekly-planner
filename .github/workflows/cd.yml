name: CD — Deploy Frontend to Azure

on:
  push:
    branches: [ main ]

jobs:
  deploy-frontend:
    name: Deploy Angular → Azure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: weekly-planner-ui/package-lock.json

      - name: Install dependencies
        working-directory: weekly-planner-ui
        run: npm ci --legacy-peer-deps

      - name: Build Angular app
        working-directory: weekly-planner-ui
        run: npm run build -- --configuration production

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: weekly-planner-ui-akshay
          publish-profile: ${{ secrets.AZURE_UI_PUBLISH_PROFILE }}
          package: weekly-planner-ui/dist/weekly-planner-ui/browser